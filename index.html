<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Tab</title>
    <link rel="icon" type="image/jpeg" href="icon.jpg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="video-container">
        <video id="bg-video" autoplay muted loop playsinline></video>
        <div id="video-overlay"></div>
    </div>

    <!-- Mode Switcher -->
    <div id="mode-switcher">
        <button id="mode-tab" class="active">NEW TAB</button>
        <button id="mode-holo">HOLO TABLE</button>
    </div>

    <!-- Holo Container (Initially Hidden) -->
    <div id="holo-view" class="hidden" aria-hidden="true">
        <iframe id="holo-frame" src="holo-prototype/building.html"></iframe>
    </div>

    <main id="content">
        <div id="search-container">
            <input type="text" id="search-input" spellcheck="false" autocomplete="off">
        </div>

        <div class="clock-container">
            <div id="time">00:00</div>
            <div id="date-row">
                <span id="day">MONDAY</span>
                <span class="separator">|</span>
                <span id="date">JANUARY 01, 2024</span>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
